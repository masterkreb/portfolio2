name: CI/CD deploy to cyon

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate:
    name: Validate PHP files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          coverage: none

      - name: Check PHP syntax
        run: |
          find . -name "*.php" -not -path "./.git/*" -print0 | xargs -0 -n 1 php -l

  deploy:
    name: Deploy website to cyon
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload files via SSH
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.CYON_HOST }}
          username: ${{ secrets.CYON_USERNAME }}
          key: ${{ secrets.CYON_SSH_KEY }}
          port: ${{ secrets.CYON_PORT }}
          source: ".htaccess,index.php,danke.html,process_form.php,rate_limit.php,README.md,css,js,images"
          target: ${{ secrets.CYON_TARGET_DIR }}
